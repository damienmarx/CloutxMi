# Cloudflare Tunnel Configuration — Degens¤Den @ cloutscape.org
# Auto-detected and used by deploy.sh
# Tunnel: cloutscape-prod
tunnel: cloutscape-prod
credentials-file: /root/.cloudflared/cloutscape-tunnel.json

# ── Ingress Rules ──────────────────────────────────────────────────────────
ingress:
  # Main app (Degens¤Den frontend + API)
  - hostname: cloutscape.org
    service: http://localhost:8080
    originRequest:
      connectTimeout: 30s
      noTLSVerify: false

  # WWW redirect
  - hostname: www.cloutscape.org
    service: http://localhost:8080
    originRequest:
      connectTimeout: 30s

  # WebSocket support for Socket.IO (live chat, games)
  - hostname: ws.cloutscape.org
    service: http://localhost:8080
    originRequest:
      connectTimeout: 30s
      noTLSVerify: false

  # API subdomain (optional)
  - hostname: api.cloutscape.org
    service: http://localhost:8080

  # Required catch-all
  - service: http_status:404

# ── Connection Settings ────────────────────────────────────────────────────
originRequest:
  connectTimeout: 30s
  noTLSVerify: false
  http2Origin: true

# ── Logging ───────────────────────────────────────────────────────────────
loglevel: info
