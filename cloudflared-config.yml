# Cloudflared Tunnel Configuration for CloutScape
tunnel: cloutscape-prod
credentials-file: /root/.cloudflared/cloutscape-tunnel.json

# Ingress rules
ingress:
  # Main application on port 8080
  - hostname: cloutscape.org
    service: http://localhost:8080
  
  # WWW subdomain
  - hostname: www.cloutscape.org
    service: http://localhost:8080
  
  # API subdomain (if needed)
  - hostname: api.cloutscape.org
    service: http://localhost:8080
  
  # Catch-all rule (required)
  - service: http_status:404

# Connection settings
originRequest:
  connectTimeout: 30s
  noTLSVerify: false
  
# Logging
loglevel: info
